<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bot de Vocabulario Primaria</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-container">

    <!-- Encabezado -->
    <div class="chat-header">
      <div class="bot-avatar">🤖</div>

      <div class="header-info">
        <h2>Maya</h2>
        <p id="headerSubtitle">Aprende inglés con imágenes</p>
      </div>

      <div class="level-badge" id="levelBadge">
        Sin nivel
      </div>
    </div>

    <!-- Caja del chat -->
    <div class="chat-box" id="chatBox"></div>

    <!-- Entrada de mensaje -->
    <div class="chat-input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Escribe tu respuesta..."
        autocomplete="off"
      />

      <button id="sendBtn">
        Enviar
      </button>
    </div>

  </div>

 <script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/chat-history.js"></script>
<script src="js/ui.js"></script>
<script src="js/vocabulary.js"></script>
<script src="js/dictionary.js"></script>
<script src="js/progress.js"></script>
<script src="js/learning.js"></script>

<script src="js/level1.js"></script>
<script src="js/level2.js"></script>
<script src="js/level3.js"></script>
<script src="js/level5.js"></script>

<script src="js/levels.js"></script>
<script src="js/math-geometry.js"></script>
<script src="js/app.js"></script>
<script src="js/app.js"></script>

</body>
</html>
